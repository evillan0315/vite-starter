<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/>
    </marker>

    <style>
      .box { fill: #0b1220; stroke: #334155; stroke-width: 1.2; rx: 12; ry: 12; }
      .title { fill: #e2e8f0; font-size: 14px; font-weight: 600; }
      .text { fill: #94a3b8; font-size: 12px; }
      .group { fill: #020617; stroke: #1e293b; stroke-width: 1.5; rx: 16; ry: 16; }
      .line { stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
      .label { fill: #cbd5e1; font-size: 13px; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="20" y="20" width="1160" height="680" class="group"/>
  <text x="40" y="50" class="label">Frontend Architecture — React 18 + Vite 5 + TypeScript</text>

  <!-- UI Layer -->
  <rect x="60" y="100" width="320" height="140" class="box"/>
  <text x="80" y="130" class="title">UI Layer</text>
  <text x="80" y="155" class="text">React Components (TSX)</text>
  <text x="80" y="175" class="text">Navbar • Pages • UI Kit</text>
  <text x="80" y="195" class="text">Material UI + Tailwind v4</text>
  <text x="80" y="215" class="text">Strict Functional Components</text>

  <!-- Feature Layer -->
  <rect x="60" y="270" width="320" height="160" class="box"/>
  <text x="80" y="300" class="title">Feature Modules</text>
  <text x="80" y="325" class="text">auth/ (Login, Callback, Hooks)</text>
  <text x="80" y="345" class="text">theme/ (Provider, Mode, Config)</text>
  <text x="80" y="365" class="text">ui/ (Loading, ThemeToggle)</text>
  <text x="80" y="385" class="text">domain-isolated logic</text>

  <!-- State Layer -->
  <rect x="60" y="460" width="320" height="120" class="box"/>
  <text x="80" y="490" class="title">State Layer</text>
  <text x="80" y="515" class="text">Nanostores</text>
  <text x="80" y="535" class="text">authStore • themeStore</text>
  <text x="80" y="555" class="text">Reactive global state</text>

  <!-- Service Layer -->
  <rect x="440" y="270" width="340" height="160" class="box"/>
  <text x="460" y="300" class="title">Service Layer</text>
  <text x="460" y="325" class="text">authService (JWT + OAuth)</text>
  <text x="460" y="345" class="text">apiClient (Axios abstraction)</text>
  <text x="460" y="365" class="text">wsClient (Socket.IO)</text>
  <text x="460" y="385" class="text">Business logic isolation</text>

  <!-- Backend Layer -->
  <rect x="840" y="220" width="320" height="220" class="box"/>
  <text x="860" y="250" class="title">Backend Layer</text>
  <text x="860" y="275" class="text">REST API (Node/Nest/etc)</text>
  <text x="860" y="295" class="text">WebSocket Server</text>
  <text x="860" y="315" class="text">JWT Authentication</text>
  <text x="860" y="335" class="text">OAuth (Google / GitHub)</text>
  <text x="860" y="355" class="text">Database Layer</text>

  <!-- Infrastructure Layer -->
  <rect x="440" y="460" width="720" height="120" class="box"/>
  <text x="460" y="490" class="title">Infrastructure Layer</text>
  <text x="460" y="515" class="text">Kubernetes WebSocket Pod</text>
  <text x="460" y="535" class="text">Environment Config (.env)</text>
  <text x="460" y="555" class="text">Vite Build Pipeline • CI/CD Ready</text>

  <!-- Flow Lines -->
  <line x1="220" y1="240" x2="220" y2="270" class="line"/>
  <line x1="220" y1="430" x2="220" y2="460" class="line"/>

  <line x1="380" y1="340" x2="440" y2="340" class="line"/>
  <line x1="780" y1="340" x2="840" y2="340" class="line"/>

  <line x1="610" y1="430" x2="610" y2="460" class="line"/>

</svg>